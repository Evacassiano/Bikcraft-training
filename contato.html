<!doctype html>

<html>
    <head>
        <meta charset="utf8" />
        <title>BikCraft</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
     <form>
        <!-- Primeira caixa -->
        <div class="primary-box">
            <div>
                <label>nome</label>
                <input type="text" placeholder="seu nome"/>
            </div>
            <div>
                <label>telefone</label>
                <input type="tel" placeholder="(xx) xxxxx-xxxx"/>
            </div>
        </div>

        <!-- segunda caixa -->
        <div>
            <label>email</label>
            <input type="email" placeholder=" contatato@email.com">
        </div>

        <!-- terceira caixa -->
        <div>
            <label>mensagem</label>
            <textarea placeholder="o que você precisa?"></textarea>
        </div>        

        <!-- botão -->
        <button>enviar mensagem</button>
     </form>     
    </body>
</html>
